<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | {{businessName}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .thank-you-card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }
    .house-icon {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, {{primaryColor}}, {{secondaryColor}});
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: housePop 0.5s ease-out;
    }
    .house-icon svg {
      color: white;
      width: 45px;
      height: 45px;
    }
    .heading {
      font-size: 34px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 16px;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }
    .subheading {
      font-size: 16px;
      color: #6b7280;
      line-height: 1.7;
      margin-bottom: 32px;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }
    .info-item {
      text-align: center;
    }
    .info-item-icon {
      width: 50px;
      height: 50px;
      background: {{primaryColor}}10;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }
    .info-item-icon svg {
      color: {{primaryColor}};
      width: 24px;
      height: 24px;
    }
    .info-item-text {
      font-size: 12px;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, {{primaryColor}}, {{secondaryColor}});
      color: white;
      padding: 18px 36px;
      border-radius: 12px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeInUp 0.6s ease-out 0.5s both;
    }
    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
    }
    .contact-section {
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid #e5e7eb;
      animation: fadeInUp 0.6s ease-out 0.6s both;
    }
    .contact-section p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .contact-links {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .contact-link {
      display: flex;
      align-items: center;
      gap: 6px;
      color: {{primaryColor}};
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }
    .contact-link svg {
      width: 18px;
      height: 18px;
    }
    @keyframes housePop {
      from {
        transform: scale(0.8) translateY(-20px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @media (max-width: 480px) {
      .info-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .contact-links {
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="thank-you-card">
    <div class="house-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </div>
    <h1 class="heading">{{heading}}</h1>
    <p class="subheading">{{subheading}}</p>
    
    <div class="info-grid">
      <div class="info-item">
        <div class="info-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </div>
        <span class="info-item-text">Quick Response</span>
      </div>
      <div class="info-item">
        <div class="info-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
        </div>
        <span class="info-item-text">Trusted Agents</span>
      </div>
      <div class="info-item">
        <div class="info-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <span class="info-item-text">Free Valuation</span>
      </div>
    </div>
    
    <a href="{{ctaUrl}}" class="cta-button">{{ctaText}}</a>
    
    {{#phoneNumber}}
    <div class="contact-section">
      <p>Questions? Our team is here to help:</p>
      <div class="contact-links">
        <a href="tel:{{phoneNumber}}" class="contact-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          {{phoneNumber}}
        </a>
      </div>
    </div>
    {{/phoneNumber}}
  </div>
</body>
</html>
