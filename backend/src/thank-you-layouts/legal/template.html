<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | {{businessName}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .thank-you-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 540px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
    }
    .scale-icon {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, {{primaryColor}}, {{secondaryColor}});
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: scaleIn 0.5s ease-out;
    }
    .scale-icon svg {
      color: white;
      width: 45px;
      height: 45px;
    }
    .badge {
      display: inline-block;
      background: {{primaryColor}}10;
      color: {{primaryColor}};
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      animation: fadeIn 0.6s ease-out 0.2s both;
    }
    .heading {
      font-size: 34px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 16px;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }
    .subheading {
      font-size: 16px;
      color: #6b7280;
      line-height: 1.7;
      margin-bottom: 32px;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }
    .trust-badges {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
      animation: fadeInUp 0.6s ease-out 0.5s both;
    }
    .trust-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .trust-badge-icon {
      width: 45px;
      height: 45px;
      background: {{primaryColor}}10;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .trust-badge-icon svg {
      color: {{primaryColor}};
      width: 22px;
      height: 22px;
    }
    .trust-badge-text {
      font-size: 11px;
      color: #6b7280;
      font-weight: 600;
    }
    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, {{primaryColor}}, {{secondaryColor}});
      color: white;
      padding: 18px 36px;
      border-radius: 12px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeInUp 0.6s ease-out 0.6s both;
    }
    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
    }
    .contact-section {
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid #e5e7eb;
      animation: fadeInUp 0.6s ease-out 0.7s both;
    }
    .contact-section p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .phone-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: {{primaryColor}};
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
    }
    .phone-link svg {
      width: 20px;
      height: 20px;
    }
    @keyframes scaleIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="thank-you-card">
    <div class="scale-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      </svg>
    </div>
    <div class="badge">Case Submitted</div>
    <h1 class="heading">{{heading}}</h1>
    <p class="subheading">{{subheading}}</p>
    
    <div class="trust-badges">
      <div class="trust-badge">
        <div class="trust-badge-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
        </div>
        <span class="trust-badge-text">Confidential</span>
      </div>
      <div class="trust-badge">
        <div class="trust-badge-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
        </div>
        <span class="trust-badge-text">Experienced</span>
      </div>
      <div class="trust-badge">
        <div class="trust-badge-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </div>
        <span class="trust-badge-text">Fast Response</span>
      </div>
    </div>
    
    <a href="{{ctaUrl}}" class="cta-button">{{ctaText}}</a>
    
    {{#phoneNumber}}
    <div class="contact-section">
      <p>Need immediate legal assistance?</p>
      <a href="tel:{{phoneNumber}}" class="phone-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
        {{phoneNumber}}
      </a>
    </div>
    {{/phoneNumber}}
  </div>
</body>
</html>
