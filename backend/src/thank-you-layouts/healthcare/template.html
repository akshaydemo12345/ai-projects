<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | {{businessName}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: linear-gradient(135deg, {{primaryColor}}10 0%, {{secondaryColor}}10 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .thank-you-card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 540px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }
    .medical-icon {
      width: 95px;
      height: 95px;
      background: linear-gradient(135deg, {{primaryColor}}, {{secondaryColor}});
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: pulseIn 0.6s ease-out;
    }
    .medical-icon svg {
      color: white;
      width: 48px;
      height: 48px;
    }
    .badge {
      display: inline-block;
      background: {{primaryColor}}10;
      color: {{primaryColor}};
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      animation: fadeIn 0.6s ease-out 0.2s both;
    }
    .heading {
      font-size: 34px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 16px;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }
    .subheading {
      font-size: 16px;
      color: #6b7280;
      line-height: 1.7;
      margin-bottom: 32px;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
      animation: fadeInUp 0.6s ease-out 0.5s both;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #6b7280;
    }
    .feature svg {
      color: {{primaryColor}};
      width: 18px;
      height: 18px;
    }
    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, {{primaryColor}}, {{secondaryColor}});
      color: white;
      padding: 18px 36px;
      border-radius: 12px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeInUp 0.6s ease-out 0.6s both;
    }
    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
    }
    .contact-section {
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid #e5e7eb;
      animation: fadeInUp 0.6s ease-out 0.7s both;
    }
    .contact-section p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .emergency-banner {
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
    }
    .emergency-banner p {
      font-size: 13px;
      color: #991b1b;
      font-weight: 600;
      margin: 0;
    }
    .phone-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: {{primaryColor}};
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
    }
    .phone-link svg {
      width: 20px;
      height: 20px;
    }
    @keyframes pulseIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="thank-you-card">
    <div class="medical-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
      </svg>
    </div>
    <div class="badge">Request Confirmed</div>
    <h1 class="heading">{{heading}}</h1>
    <p class="subheading">{{subheading}}</p>
    
    <div class="features">
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        Licensed Providers
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        HIPAA Compliant
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        24/7 Support
      </div>
    </div>
    
    <a href="{{ctaUrl}}" class="cta-button">{{ctaText}}</a>
    
    {{#phoneNumber}}
    <div class="contact-section">
      <p>Need to speak with someone immediately?</p>
      <a href="tel:{{phoneNumber}}" class="phone-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
        {{phoneNumber}}
      </a>
      <div class="emergency-banner">
        <p>⚠️ For medical emergencies, please call 911 or visit your nearest emergency room.</p>
      </div>
    </div>
    {{/phoneNumber}}
  </div>
</body>
</html>
